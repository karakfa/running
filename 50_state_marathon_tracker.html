<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>50-State Marathon Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #ffffff;
    color: #1a1a1a;
    padding: 24px;
    max-width: 860px;
    margin: 0 auto;
  }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 4px; color: #1a1a1a; }
  .subtitle { font-size: 12px; color: #888; margin-bottom: 16px; }

  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
  .stat { background: #f5f5f3; border-radius: 8px; padding: 12px 16px; }
  .stat-label { font-size: 12px; color: #888; margin-bottom: 2px; }
  .stat-val { font-size: 22px; font-weight: 500; color: #1a1a1a; }

  .progress-wrap { background: #f5f5f3; border-radius: 6px; height: 8px; margin-bottom: 16px; overflow: hidden; }
  .progress-bar { height: 100%; background: #1D9E75; border-radius: 6px; transition: width .4s; }

  .legend-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 14px; font-size: 12px; color: #888; align-items: center; }
  .leg { display: flex; align-items: center; gap: 5px; }
  .leg-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .hint { font-size: 11px; color: #aaa; }

  .section-label { font-size: 12px; color: #888; margin-bottom: 8px; }
  svg#usmap { width: 100%; display: block; margin-bottom: 20px; border-radius: 8px; background: #fafaf9; }

  .state-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: 6px; }
  .state-card {
    border-radius: 8px;
    border: 0.5px solid #e0ddd8;
    padding: 7px 9px;
    background: #ffffff;
    transition: border-color .15s;
  }
  .state-card:hover { border-color: #aaa; }
  .state-card.done { background: #f0faf5; border-color: #86d4b0; }

  .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .sc-name { font-size: 12px; font-weight: 500; color: #1a1a1a; }
  .state-card.done .sc-name { color: #0F6E56; }

  .check-btn {
    width: 18px; height: 18px; border-radius: 4px;
    border: 0.5px solid #ccc;
    background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; flex-shrink: 0; color: #888; padding: 0;
    line-height: 1;
  }
  .state-card.done .check-btn { background: #f0faf5; border-color: #86d4b0; color: #0F6E56; }

  .race-input {
    width: 100%; font-size: 11px; padding: 3px 6px;
    border-radius: 4px; border: 0.5px solid #e0ddd8;
    background: #ffffff; color: #1a1a1a;
    outline: none; height: 24px;
    font-family: inherit;
  }
  .race-input:focus { border-color: #888; }
  .state-card.done .race-input { background: #f0faf5; border-color: #86d4b0; color: #0F6E56; }

  @media print {
    body { padding: 16px; }
    .hint { display: none; }
  }
</style>
</head>
<body>

<h1>50-state marathon tracker</h1>
<p class="subtitle">Click a checkbox to mark a state done · edit any race name inline</p>

<div class="stats-row">
  <div class="stat"><div class="stat-label">Completed</div><div class="stat-val" id="s-done">3</div></div>
  <div class="stat"><div class="stat-label">Remaining</div><div class="stat-val" id="s-left">47</div></div>
  <div class="stat"><div class="stat-label">Progress</div><div class="stat-val" id="s-pct">6%</div></div>
</div>

<div class="progress-wrap"><div class="progress-bar" id="prog-bar" style="width:6%"></div></div>

<div class="legend-row">
  <div class="leg"><div class="leg-dot" style="background:#f0faf5;border:0.5px solid #86d4b0"></div>Done</div>
  <div class="leg"><div class="leg-dot" style="background:#fff;border:0.5px solid #e0ddd8"></div>Not yet</div>
  <span class="hint">Click checkbox to toggle · edit race name inline</span>
</div>

<div class="section-label">Map view</div>
<svg id="usmap" viewBox="0 0 960 580"></svg>

<div class="section-label">All 50 states</div>
<div class="state-grid" id="grid"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script>
const allStates = [
  {abbr:"AL",name:"Alabama",race:"Rocket City Marathon",done:false},
  {abbr:"AK",name:"Alaska",race:"Mayor's Marathon",done:false},
  {abbr:"AZ",name:"Arizona",race:"Rock 'n' Roll Arizona",done:false},
  {abbr:"AR",name:"Arkansas",race:"Little Rock Marathon",done:false},
  {abbr:"CA",name:"California",race:"Rock 'n' Roll San Diego",done:true},
  {abbr:"CO",name:"Colorado",race:"Denver Colfax Marathon",done:false},
  {abbr:"CT",name:"Connecticut",race:"Hartford Marathon",done:false},
  {abbr:"DE",name:"Delaware",race:"Delaware Marathon",done:false},
  {abbr:"FL",name:"Florida",race:"Miami Marathon",done:false},
  {abbr:"GA",name:"Georgia",race:"Atlanta Marathon",done:false},
  {abbr:"HI",name:"Hawaii",race:"Honolulu Marathon",done:false},
  {abbr:"ID",name:"Idaho",race:"Robie Creek Marathon",done:false},
  {abbr:"IL",name:"Illinois",race:"Chicago Marathon",done:false},
  {abbr:"IN",name:"Indiana",race:"Indy Monumental Marathon",done:false},
  {abbr:"IA",name:"Iowa",race:"IMT Des Moines Marathon",done:false},
  {abbr:"KS",name:"Kansas",race:"Waddell & Reed Marathon",done:false},
  {abbr:"KY",name:"Kentucky",race:"Louisville Marathon",done:false},
  {abbr:"LA",name:"Louisiana",race:"Crescent City Classic",done:false},
  {abbr:"ME",name:"Maine",race:"MDI Marathon",done:false},
  {abbr:"MD",name:"Maryland",race:"Baltimore Marathon",done:false},
  {abbr:"MA",name:"Massachusetts",race:"Boston Marathon",done:false},
  {abbr:"MI",name:"Michigan",race:"Detroit Free Press Marathon",done:false},
  {abbr:"MN",name:"Minnesota",race:"Twin Cities Marathon",done:false},
  {abbr:"MS",name:"Mississippi",race:"MS Gulf Coast Marathon",done:false},
  {abbr:"MO",name:"Missouri",race:"St. Louis Marathon",done:false},
  {abbr:"MT",name:"Montana",race:"Big Sky Marathon",done:false},
  {abbr:"NE",name:"Nebraska",race:"Omaha Marathon",done:false},
  {abbr:"NV",name:"Nevada",race:"Rock 'n' Roll Las Vegas",done:false},
  {abbr:"NH",name:"New Hampshire",race:"NH Marathon",done:false},
  {abbr:"NJ",name:"New Jersey",race:"NJ Marathon",done:true},
  {abbr:"NM",name:"New Mexico",race:"Duke City Marathon",done:false},
  {abbr:"NY",name:"New York",race:"NYC Marathon",done:true},
  {abbr:"NC",name:"North Carolina",race:"Charlotte Marathon",done:false},
  {abbr:"ND",name:"North Dakota",race:"Fargo Marathon",done:false},
  {abbr:"OH",name:"Ohio",race:"Columbus Marathon",done:false},
  {abbr:"OK",name:"Oklahoma",race:"OKC Memorial Marathon",done:false},
  {abbr:"OR",name:"Oregon",race:"Portland Marathon",done:false},
  {abbr:"PA",name:"Pennsylvania",race:"Philadelphia Marathon",done:false},
  {abbr:"RI",name:"Rhode Island",race:"Ocean's Run Marathon",done:false},
  {abbr:"SC",name:"South Carolina",race:"Charleston Marathon",done:false},
  {abbr:"SD",name:"South Dakota",race:"Deadwood Mickelson Trail",done:false},
  {abbr:"TN",name:"Tennessee",race:"St. Jude Memphis Marathon",done:false},
  {abbr:"TX",name:"Texas",race:"Houston Marathon",done:false},
  {abbr:"UT",name:"Utah",race:"St. George Marathon",done:false},
  {abbr:"VT",name:"Vermont",race:"Vermont City Marathon",done:false},
  {abbr:"VA",name:"Virginia",race:"Marine Corps Marathon",done:false},
  {abbr:"WA",name:"Washington",race:"Seattle Marathon",done:false},
  {abbr:"WV",name:"West Virginia",race:"WV Marathon",done:false},
  {abbr:"WI",name:"Wisconsin",race:"Lakefront Marathon",done:false},
  {abbr:"WY",name:"Wyoming",race:"Casper Marathon",done:false},
];

const stateNameMap = {
  "Alabama":"AL","Alaska":"AK","Arizona":"AZ","Arkansas":"AR","California":"CA",
  "Colorado":"CO","Connecticut":"CT","Delaware":"DE","Florida":"FL","Georgia":"GA",
  "Hawaii":"HI","Idaho":"ID","Illinois":"IL","Indiana":"IN","Iowa":"IA","Kansas":"KS",
  "Kentucky":"KY","Louisiana":"LA","Maine":"ME","Maryland":"MD","Massachusetts":"MA",
  "Michigan":"MI","Minnesota":"MN","Mississippi":"MS","Missouri":"MO","Montana":"MT",
  "Nebraska":"NE","Nevada":"NV","New Hampshire":"NH","New Jersey":"NJ","New Mexico":"NM",
  "New York":"NY","North Carolina":"NC","North Dakota":"ND","Ohio":"OH","Oklahoma":"OK",
  "Oregon":"OR","Pennsylvania":"PA","Rhode Island":"RI","South Carolina":"SC",
  "South Dakota":"SD","Tennessee":"TN","Texas":"TX","Utah":"UT","Vermont":"VT",
  "Virginia":"VA","Washington":"WA","West Virginia":"WV","Wisconsin":"WI","Wyoming":"WY"
};

const stateByAbbr = {};
allStates.forEach(s => stateByAbbr[s.abbr] = s);

function updateStats() {
  const done = allStates.filter(s => s.done).length;
  const total = allStates.length;
  const pct = Math.round(done / total * 100);
  document.getElementById("s-done").textContent = done;
  document.getElementById("s-left").textContent = total - done;
  document.getElementById("s-pct").textContent = pct + "%";
  document.getElementById("prog-bar").style.width = pct + "%";
}

function renderMap() {
  d3.select("#usmap").selectAll("path.state")
    .attr("fill", d => {
      const abbr = stateNameMap[d.properties.name];
      const s = abbr ? stateByAbbr[abbr] : null;
      return s && s.done ? "#1D9E75" : "#f0efea";
    });
}

function buildGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  [...allStates].sort((a, b) => a.name.localeCompare(b.name)).forEach(s => {
    const card = document.createElement("div");
    card.className = "state-card" + (s.done ? " done" : "");

    const top = document.createElement("div");
    top.className = "card-top";

    const nameSpan = document.createElement("span");
    nameSpan.className = "sc-name";
    nameSpan.textContent = s.abbr + " — " + s.name;

    const btn = document.createElement("button");
    btn.className = "check-btn";
    btn.textContent = s.done ? "✓" : "";
    btn.title = s.done ? "Mark not done" : "Mark done";
    btn.onclick = () => {
      s.done = !s.done;
      card.className = "state-card" + (s.done ? " done" : "");
      btn.textContent = s.done ? "✓" : "";
      btn.title = s.done ? "Mark not done" : "Mark done";
      updateStats();
      renderMap();
    };

    top.appendChild(nameSpan);
    top.appendChild(btn);

    const input = document.createElement("input");
    input.type = "text";
    input.className = "race-input";
    input.value = s.race;
    input.placeholder = "Race name";
    input.oninput = () => { s.race = input.value; };
    input.onclick = e => e.stopPropagation();

    card.appendChild(top);
    card.appendChild(input);
    grid.appendChild(card);
  });
}

fetch("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json")
  .then(r => r.json())
  .then(us => {
    const svg = d3.select("#usmap");
    const projection = d3.geoAlbersUsa().scale(1200).translate([480, 290]);
    const path = d3.geoPath().projection(projection);
    svg.selectAll("path.state")
      .data(topojson.feature(us, us.objects.states).features)
      .join("path").attr("class", "state").attr("d", path)
      .attr("stroke", "#d8d5cf").attr("stroke-width", 0.5)
      .attr("fill", d => {
        const abbr = stateNameMap[d.properties.name];
        const s = abbr ? stateByAbbr[abbr] : null;
        return s && s.done ? "#1D9E75" : "#f0efea";
      });
  });

buildGrid();
updateStats();
</script>
</body>
</html>
